<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Body Interactive</title>

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #000;
  }

  #bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #0a1628 0%, #060d1a 40%, #020508 100%);
    z-index: 0;
  }

  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: 0.3;
    pointer-events: none;
  }

  #page-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    overflow: hidden;
  }

  #human-figure {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 95vh;
    width: auto;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.15));
    z-index: 2;
    pointer-events: none;
  }

  #lines-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  #lines-svg line {
    stroke: rgba(0, 180, 255, 0.5);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(0, 180, 255, 0.6));
  }

  #lines-svg circle.dot-end {
    fill: rgba(0, 200, 255, 0.8);
    filter: drop-shadow(0 0 5px rgba(0, 200, 255, 0.9));
  }

  .organ-btn {
    position: absolute;
    z-index: 4;
    background: rgba(0, 20, 50, 0.7);
    border: 1px solid rgba(0, 180, 255, 0.45);
    color: #b0dcff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 150, 255, 0.15), inset 0 0 8px rgba(0, 150, 255, 0.05);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .organ-btn:hover {
    background: rgba(0, 60, 120, 0.75);
    border-color: rgba(0, 210, 255, 0.8);
    color: #ffffff;
    box-shadow: 0 0 22px rgba(0, 180, 255, 0.4), inset 0 0 12px rgba(0, 180, 255, 0.1);
    transform: scale(1.07);
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
  }

  .organ-btn:active {
    transform: scale(0.97);
  }

  /* ---------- Modal ---------- */
  #modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  #modal-box {
    background: linear-gradient(145deg, rgba(8, 25, 50, 0.95), rgba(4, 12, 30, 0.98));
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 10px;
    width: 520px;
    max-width: 90vw;
    max-height: 70vh;
    padding: 30px 35px;
    position: relative;
    box-shadow: 0 0 40px rgba(0, 120, 255, 0.15), 0 0 80px rgba(0, 80, 200, 0.08);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s ease;
    overflow-y: auto;
  }

  #modal-overlay.active #modal-box {
    transform: translateY(0) scale(1);
  }

  #modal-title {
    font-size: 22px;
    font-weight: 600;
    color: #60c8ff;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 180, 255, 0.3);
    border-bottom: 1px solid rgba(0, 150, 255, 0.2);
    padding-bottom: 12px;
  }

  #modal-content {
    font-size: 15px;
    line-height: 1.75;
    color: #c0d8ee;
    white-space: pre-wrap;
  }

  #modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: transparent;
    border: 1px solid rgba(0, 180, 255, 0.3);
    color: #80b8e0;
    font-size: 18px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    line-height: 1;
  }

  #modal-close:hover {
    background: rgba(0, 120, 255, 0.2);
    border-color: rgba(0, 210, 255, 0.7);
    color: #fff;
    box-shadow: 0 0 12px rgba(0, 180, 255, 0.4);
  }

  #modal-loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: #5ab8e8;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #modal-loading.show { display: block; }

  #modal-loading .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0, 150, 255, 0.2);
    border-top: 3px solid rgba(0, 180, 255, 0.8);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #modal-box::-webkit-scrollbar { width: 6px; }
  #modal-box::-webkit-scrollbar-track { background: rgba(0, 20, 50, 0.5); }
  #modal-box::-webkit-scrollbar-thumb { background: rgba(0, 150, 255, 0.3); border-radius: 3px; }

  /* ---------- Debug coordinate helper ---------- */
  #coord-display {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 9999;
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    background: rgba(0,0,0,0.8);
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    display: none; /* Change to block to enable */
  }
</style>
</head>
<body>

<!-- ======================== BACKGROUND ======================== -->
<div id="bg-gradient"></div>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="materials/background.mp4" type="video/mp4">
</video>

<!-- ======================== PAGE CONTAINER ======================== -->
<div id="page-container">
  <img id="human-figure" src="materials/human.png" alt="Human Body">

  <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg">
    <line id="line-brain"/><circle class="dot-end" id="dot-brain" r="5"/>
    <line id="line-tongue"/><circle class="dot-end" id="dot-tongue" r="5"/>
    <line id="line-heart"/><circle class="dot-end" id="dot-heart" r="5"/>
    <line id="line-vessel"/><circle class="dot-end" id="dot-vessel" r="5"/>
    <line id="line-bone"/><circle class="dot-end" id="dot-bone" r="5"/>
  </svg>

  <button class="organ-btn" id="btn-brain"  data-organ="brain"  data-file="materials/brain.txt">Brain</button>
  <button class="organ-btn" id="btn-tongue" data-organ="tongue" data-file="materials/tongue.txt">Tongue</button>
  <button class="organ-btn" id="btn-heart"  data-organ="heart"  data-file="materials/heart.txt">Heart</button>
  <button class="organ-btn" id="btn-vessel" data-organ="vessel" data-file="materials/vessel.txt">Blood Vessel</button>
  <button class="organ-btn" id="btn-bone"   data-organ="bone"   data-file="materials/bone.txt">Bone</button>
</div>

<!-- ======================== MODAL ======================== -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">&times;</button>
    <div id="modal-title"></div>
    <div id="modal-loading"><div class="spinner"></div>Loading...</div>
    <div id="modal-content"></div>
  </div>
</div>

<div id="coord-display"></div>

<!-- ======================== JAVASCRIPT ======================== -->
<script>
(function() {

  var humanFigure  = document.getElementById('human-figure');
  var modalOverlay = document.getElementById('modal-overlay');
  var modalTitle   = document.getElementById('modal-title');
  var modalContent = document.getElementById('modal-content');
  var modalLoading = document.getElementById('modal-loading');
  var modalClose   = document.getElementById('modal-close');
  var organButtons = document.querySelectorAll('.organ-btn');
  var coordDisplay = document.getElementById('coord-display');

  /* ===========================================================
   *  NEW APPROACH: Use viewport-fraction positioning for dots.
   *
   *  Your exact pixel coordinates (from 1920x1080 full screen):
   *    Brain:  already correct (keeping as image %)
   *    Heart:  (990, 727)  → viewport-relative: (990, 667)
   *    Vessel: (925, 572)  → viewport-relative: (925, 512)
   *    Tongue: (866, 422)  → viewport-relative: (866, 362)
   *    Bone:   (739, 756)  → viewport-relative: (739, 696)
   *
   *  Chrome offset ≈ 60px top.
   *  Viewport: 1920 x 728
   *
   *  As viewport fractions:
   *    Heart:  (990/1920, 667/728) = (0.5156, 0.9162)
   *    Vessel: (925/1920, 512/728) = (0.4818, 0.7033)
   *    Tongue: (866/1920, 362/728) = (0.4510, 0.4973)
   *    Bone:   (739/1920, 696/728) = (0.3849, 0.9560)
   * =========================================================== */

  /* Viewport-fraction targets (vx, vy as fraction of viewport width/height) */
  var vpTargets = {
    brain:  null,  /* brain uses image-% method since it's already correct */
    heart:  { vx: 0.5156, vy: 0.9162 },
    vessel: { vx: 0.4818, vy: 0.7033 },
    tongue: { vx: 0.4510, vy: 0.4973 },
    bone:   { vx: 0.3849, vy: 0.9560 }
  };

  /* Brain stays with image-% (confirmed working) */
  var brainImgTarget = { x: 0.47, y: 0.19 };

  var buttonLayout = {
    brain:  { side: 'right', yPct: 0.160, margin: 30 },
    tongue: { side: 'left',  yPct: 0.400, margin: 20 },
    heart:  { side: 'right', yPct: 0.540, margin: 30 },
    vessel: { side: 'left',  yPct: 0.650, margin: 20 },
    bone:   { side: 'right', yPct: 0.830, margin: 30 }
  };

  /* -------- Core update -------- */
  function updateAll() {
    var imgRect = humanFigure.getBoundingClientRect();
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    organButtons.forEach(function(btn) {
      var organ  = btn.dataset.organ;
      var layout = buttonLayout[organ];
      if (!layout) return;

      /* Position button */
      var btnH = btn.offsetHeight;
      var topPx = vh * layout.yPct - btnH / 2;
      btn.style.top = topPx + 'px';

      if (layout.side === 'right') {
        btn.style.right = layout.margin + 'px';
        btn.style.left  = 'auto';
      } else {
        btn.style.left  = layout.margin + 'px';
        btn.style.right = 'auto';
      }

      /* Line start: inner edge of button */
      var btnRect = btn.getBoundingClientRect();
      var bx, by;
      by = btnRect.top + btnRect.height / 2;
      if (layout.side === 'right') {
        bx = btnRect.left;
      } else {
        bx = btnRect.right;
      }

      /* Target dot position */
      var tx, ty;

      if (organ === 'brain') {
        /* Brain uses image-relative % */
        tx = imgRect.left + imgRect.width  * brainImgTarget.x;
        ty = imgRect.top  + imgRect.height * brainImgTarget.y;
      } else {
        /* All others use viewport-fraction from your exact pixel measurements */
        var vpt = vpTargets[organ];
        tx = vw * vpt.vx;
        ty = vh * vpt.vy;
      }

      var line = document.getElementById('line-' + organ);
      var dot  = document.getElementById('dot-'  + organ);

      if (line) {
        line.setAttribute('x1', bx);
        line.setAttribute('y1', by);
        line.setAttribute('x2', tx);
        line.setAttribute('y2', ty);
      }
      if (dot) {
        dot.setAttribute('cx', tx);
        dot.setAttribute('cy', ty);
      }
    });
  }

  /* -------- Init -------- */
  function init() {
    updateAll();
    var count = 0;
    var interval = setInterval(function() {
      updateAll();
      if (++count > 30) clearInterval(interval);
    }, 150);
  }

  humanFigure.addEventListener('load', init);
  window.addEventListener('resize', updateAll);
  window.addEventListener('load', init);
  if (humanFigure.complete) setTimeout(init, 30);

  /* -------- Coordinate helper -------- */
  document.addEventListener('mousemove', function(e) {
    if (getComputedStyle(coordDisplay).display === 'none') return;
    var imgRect = humanFigure.getBoundingClientRect();
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    coordDisplay.textContent =
      'screen: (' + e.clientX + ', ' + e.clientY + ')  |  ' +
      'vp%: { vx: ' + (e.clientX/vw).toFixed(4) + ', vy: ' + (e.clientY/vh).toFixed(4) + ' }  |  ' +
      'img%: { x: ' + ((e.clientX - imgRect.left)/imgRect.width).toFixed(3) +
      ', y: ' + ((e.clientY - imgRect.top)/imgRect.height).toFixed(3) + ' }';
  });

  /* -------- Modal -------- */
  organButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var file  = btn.dataset.file;
      var title = btn.textContent;
      modalTitle.textContent   = title;
      modalContent.textContent = '';
      modalLoading.classList.add('show');
      modalOverlay.classList.add('active');

      fetch(file)
        .then(function(r) {
          if (!r.ok) throw new Error('File not found: ' + file);
          return r.text();
        })
        .then(function(text) {
          modalLoading.classList.remove('show');
          modalContent.textContent = text;
        })
        .catch(function(err) {
          modalLoading.classList.remove('show');
          modalContent.textContent = 'Could not load content.\n' + err.message;
        });
    });
  });

  modalClose.addEventListener('click', function() { modalOverlay.classList.remove('active'); });
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) modalOverlay.classList.remove('active');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') modalOverlay.classList.remove('active');
  });

})();
</script>

</body>
</html>
