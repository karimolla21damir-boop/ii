<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Body Interactive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #000;
  }

  #bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #254060 0%, #1a3355 25%, #122848 50%, #0c1e3a 75%, #081428 100%);
    z-index: 0;
  }

  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: 0.65;
    pointer-events: none;
  }

  #page-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    overflow: hidden;
  }

  #human-figure {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 95vh;
    width: auto;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.15));
    z-index: 2;
    pointer-events: none;
  }

  #lines-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  #lines-svg line {
    stroke: rgba(0, 180, 255, 0.5);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(0, 180, 255, 0.6));
  }

  #lines-svg circle.dot-end {
    fill: rgba(0, 200, 255, 0.8);
    filter: drop-shadow(0 0 5px rgba(0, 200, 255, 0.9));
  }

  .organ-btn {
    position: absolute;
    z-index: 4;
    background: rgba(0, 20, 50, 0.7);
    border: 1px solid rgba(0, 180, 255, 0.45);
    color: #b0dcff;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 150, 255, 0.15), inset 0 0 8px rgba(0, 150, 255, 0.05);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .organ-btn:hover {
    background: rgba(0, 60, 120, 0.75);
    border-color: rgba(0, 210, 255, 0.8);
    color: #ffffff;
    box-shadow: 0 0 22px rgba(0, 180, 255, 0.4), inset 0 0 12px rgba(0, 180, 255, 0.1);
    transform: scale(1.07);
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
  }

  .organ-btn:active {
    transform: scale(0.97);
  }

  #modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  #modal-box {
    background: linear-gradient(145deg, rgba(8, 25, 50, 0.95), rgba(4, 12, 30, 0.98));
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 14px;
    width: 750px;
    max-width: 90vw;
    max-height: 80vh;
    padding: 40px 50px;
    position: relative;
    box-shadow: 0 0 50px rgba(0, 120, 255, 0.2), 0 0 100px rgba(0, 80, 200, 0.1);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s ease;
    overflow-y: auto;
  }

  #modal-overlay.active #modal-box {
    transform: translateY(0) scale(1);
  }

  #modal-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #60c8ff;
    margin-bottom: 22px;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(0, 180, 255, 0.4);
    border-bottom: 1px solid rgba(0, 150, 255, 0.25);
    padding-bottom: 16px;
  }

  #modal-content {
    font-family: 'Rajdhani', sans-serif;
    font-size: 19px;
    font-weight: 400;
    line-height: 1.85;
    color: #c8ddf0;
    white-space: pre-wrap;
    letter-spacing: 0.3px;
  }

  #modal-close {
    position: absolute;
    top: 16px;
    right: 18px;
    background: transparent;
    border: 1px solid rgba(0, 180, 255, 0.3);
    color: #80b8e0;
    font-size: 20px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    line-height: 1;
  }

  #modal-close:hover {
    background: rgba(0, 120, 255, 0.2);
    border-color: rgba(0, 210, 255, 0.7);
    color: #fff;
    box-shadow: 0 0 12px rgba(0, 180, 255, 0.4);
  }

  #modal-loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: #5ab8e8;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #modal-loading.show { display: block; }

  #modal-loading .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0, 150, 255, 0.2);
    border-top: 3px solid rgba(0, 180, 255, 0.8);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #modal-box::-webkit-scrollbar { width: 6px; }
  #modal-box::-webkit-scrollbar-track { background: rgba(0, 20, 50, 0.5); }
  #modal-box::-webkit-scrollbar-thumb { background: rgba(0, 150, 255, 0.3); border-radius: 3px; }
</style>
</head>
<body>

<div id="bg-gradient"></div>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="materials/background.mp4" type="video/mp4">
</video>

<div id="page-container">
  <img id="human-figure" src="materials/human.png" alt="Human Body">

  <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg">
    <line id="line-brain"/><circle class="dot-end" id="dot-brain" r="5"/>
    <line id="line-tongue"/><circle class="dot-end" id="dot-tongue" r="5"/>
    <line id="line-heart"/><circle class="dot-end" id="dot-heart" r="5"/>
    <line id="line-vessel"/><circle class="dot-end" id="dot-vessel" r="5"/>
    <line id="line-bone"/><circle class="dot-end" id="dot-bone" r="5"/>
  </svg>

  <button class="organ-btn" id="btn-brain"  data-organ="brain"  data-file="materials/brain.txt">Brain</button>
  <button class="organ-btn" id="btn-tongue" data-organ="tongue" data-file="materials/tongue.txt">Tongue</button>
  <button class="organ-btn" id="btn-heart"  data-organ="heart"  data-file="materials/heart.txt">Heart</button>
  <button class="organ-btn" id="btn-vessel" data-organ="vessel" data-file="materials/vessel.txt">Blood Vessel</button>
  <button class="organ-btn" id="btn-bone"   data-organ="bone"   data-file="materials/bone.txt">Bone</button>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">&times;</button>
    <div id="modal-title"></div>
    <div id="modal-loading"><div class="spinner"></div>Loading...</div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
(function() {

  var humanFigure  = document.getElementById('human-figure');
  var modalOverlay = document.getElementById('modal-overlay');
  var modalTitle   = document.getElementById('modal-title');
  var modalContent = document.getElementById('modal-content');
  var modalLoading = document.getElementById('modal-loading');
  var modalClose   = document.getElementById('modal-close');
  var organButtons = document.querySelectorAll('.organ-btn');
  var bgVideo      = document.getElementById('bg-video');

  /* Force video to loop at exactly 7.9 seconds */
  bgVideo.addEventListener('timeupdate', function() {
    if (bgVideo.currentTime >= 7.9) {
      bgVideo.currentTime = 0;
      bgVideo.play();
    }
  });

  var dotPositions = {
    brain:  { xPct: 0.4990, yPct: 0.2093 },
    tongue: { xPct: 0.4443, yPct: 0.3528 },
    heart:  { xPct: 0.5141, yPct: 0.6833 },
    vessel: { xPct: 0.4766, yPct: 0.4824 },
    bone:   { xPct: 0.3703, yPct: 0.6852 }
  };

  var buttonLayout = {
    brain:  { side: 'right', yPct: 0.152, margin: 260 },
    tongue: { side: 'left',  yPct: 0.300, margin: 150 },
    heart:  { side: 'right', yPct: 0.500, margin: 260 },
    vessel: { side: 'left',  yPct: 0.430, margin: 150 },
    bone:   { side: 'left',  yPct: 0.680, margin: 150 }
  };

  function updateAll() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    organButtons.forEach(function(btn) {
      var organ  = btn.dataset.organ;
      var layout = buttonLayout[organ];
      var dotPos = dotPositions[organ];
      if (!layout || !dotPos) return;

      var btnH = btn.offsetHeight;
      var topPx = vh * layout.yPct - btnH / 2;
      btn.style.top = topPx + 'px';

      if (layout.side === 'right') {
        btn.style.right = layout.margin + 'px';
        btn.style.left  = 'auto';
      } else {
        btn.style.left  = layout.margin + 'px';
        btn.style.right = 'auto';
      }

      var btnRect = btn.getBoundingClientRect();
      var bx, by;
      by = btnRect.top + btnRect.height / 2;
      bx = (layout.side === 'right') ? btnRect.left : btnRect.right;

      var tx = vw * dotPos.xPct;
      var ty = vh * dotPos.yPct;

      var line = document.getElementById('line-' + organ);
      var dot  = document.getElementById('dot-'  + organ);

      if (line) {
        line.setAttribute('x1', bx);
        line.setAttribute('y1', by);
        line.setAttribute('x2', tx);
        line.setAttribute('y2', ty);
      }
      if (dot) {
        dot.setAttribute('cx', tx);
        dot.setAttribute('cy', ty);
      }
    });
  }

  function init() {
    updateAll();
    var count = 0;
    var interval = setInterval(function() {
      updateAll();
      if (++count > 30) clearInterval(interval);
    }, 150);
  }

  humanFigure.addEventListener('load', init);
  window.addEventListener('resize', updateAll);
  window.addEventListener('load', init);
  if (humanFigure.complete) setTimeout(init, 30);

  organButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var file  = btn.dataset.file;
      var title = btn.textContent;
      modalTitle.textContent   = title;
      modalContent.textContent = '';
      modalLoading.classList.add('show');
      modalOverlay.classList.add('active');

      fetch(file)
        .then(function(r) {
          if (!r.ok) throw new Error('File not found: ' + file);
          return r.text();
        })
        .then(function(text) {
          modalLoading.classList.remove('show');
          modalContent.textContent = text;
        })
        .catch(function(err) {
          modalLoading.classList.remove('show');
          modalContent.textContent = 'Could not load content.\n' + err.message;
        });
    });
  });

  modalClose.addEventListener('click', function() { modalOverlay.classList.remove('active'); });
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) modalOverlay.classList.remove('active');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') modalOverlay.classList.remove('active');
  });

})();
</script>

</body>
</html>
