<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Body Interactive</title>

<!-- ======================== CSS ======================== -->
<style>
  /* ---------- Reset & Base ---------- */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #000;
  }

  /* ---------- Background Gradient ---------- */
  #bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #0a1628 0%, #060d1a 40%, #020508 100%);
    z-index: 0;
  }

  /* ---------- Background Video ---------- */
  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: 0.3;
    pointer-events: none;
  }

  /* ---------- Full Page Container for buttons + lines ---------- */
  #page-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    overflow: hidden;
  }

  /* ---------- Human Figure ---------- */
  #human-figure {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 92vh;
    width: auto;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.15));
    z-index: 2;
  }

  /* ---------- SVG Lines Layer ---------- */
  #lines-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  #lines-svg line {
    stroke: rgba(0, 180, 255, 0.5);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(0, 180, 255, 0.6));
  }

  #lines-svg circle.dot-end {
    fill: rgba(0, 200, 255, 0.8);
    filter: drop-shadow(0 0 4px rgba(0, 200, 255, 0.9));
  }

  /* ---------- Interactive Buttons ---------- */
  .organ-btn {
    position: absolute;
    z-index: 4;
    background: rgba(0, 20, 50, 0.7);
    border: 1px solid rgba(0, 180, 255, 0.45);
    color: #b0dcff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.35s ease;
    box-shadow: 0 0 10px rgba(0, 150, 255, 0.15), inset 0 0 8px rgba(0, 150, 255, 0.05);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .organ-btn:hover {
    background: rgba(0, 60, 120, 0.75);
    border-color: rgba(0, 210, 255, 0.8);
    color: #ffffff;
    box-shadow: 0 0 20px rgba(0, 180, 255, 0.4), inset 0 0 12px rgba(0, 180, 255, 0.1);
    transform: scale(1.07);
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
  }

  .organ-btn:active {
    transform: scale(0.97);
  }

  /* ---------- Modal Overlay ---------- */
  #modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  /* ---------- Modal Box ---------- */
  #modal-box {
    background: linear-gradient(145deg, rgba(8, 25, 50, 0.95), rgba(4, 12, 30, 0.98));
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 10px;
    width: 500px;
    max-width: 90vw;
    max-height: 70vh;
    padding: 30px 35px;
    position: relative;
    box-shadow: 0 0 40px rgba(0, 120, 255, 0.15), 0 0 80px rgba(0, 80, 200, 0.08);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s ease;
    overflow-y: auto;
  }

  #modal-overlay.active #modal-box {
    transform: translateY(0) scale(1);
  }

  #modal-title {
    font-size: 22px;
    font-weight: 600;
    color: #60c8ff;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 180, 255, 0.3);
    border-bottom: 1px solid rgba(0, 150, 255, 0.2);
    padding-bottom: 12px;
  }

  #modal-content {
    font-size: 15px;
    line-height: 1.75;
    color: #c0d8ee;
    white-space: pre-wrap;
  }

  #modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: transparent;
    border: 1px solid rgba(0, 180, 255, 0.3);
    color: #80b8e0;
    font-size: 18px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    line-height: 1;
  }

  #modal-close:hover {
    background: rgba(0, 120, 255, 0.2);
    border-color: rgba(0, 210, 255, 0.7);
    color: #fff;
    box-shadow: 0 0 12px rgba(0, 180, 255, 0.4);
  }

  /* ---------- Loading Spinner ---------- */
  #modal-loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: #5ab8e8;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #modal-loading.show {
    display: block;
  }

  #modal-loading .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0, 150, 255, 0.2);
    border-top: 3px solid rgba(0, 180, 255, 0.8);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ---------- Scrollbar for modal ---------- */
  #modal-box::-webkit-scrollbar {
    width: 6px;
  }
  #modal-box::-webkit-scrollbar-track {
    background: rgba(0, 20, 50, 0.5);
  }
  #modal-box::-webkit-scrollbar-thumb {
    background: rgba(0, 150, 255, 0.3);
    border-radius: 3px;
  }
</style>
</head>
<body>

<!-- ======================== BACKGROUND GRADIENT ======================== -->
<div id="bg-gradient"></div>

<!-- ======================== BACKGROUND VIDEO ======================== -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="materials/background.mp4" type="video/mp4">
</video>

<!-- ======================== PAGE CONTAINER ======================== -->
<div id="page-container">

  <!-- Human Figure Image -->
  <img id="human-figure" src="materials/human.png" alt="Human Body">

  <!-- SVG Lines connecting buttons to organ locations -->
  <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg">
    <line id="line-brain" x1="0" y1="0" x2="0" y2="0"/>
    <circle class="dot-end" id="dot-brain" cx="0" cy="0" r="4"/>

    <line id="line-tongue" x1="0" y1="0" x2="0" y2="0"/>
    <circle class="dot-end" id="dot-tongue" cx="0" cy="0" r="4"/>

    <line id="line-heart" x1="0" y1="0" x2="0" y2="0"/>
    <circle class="dot-end" id="dot-heart" cx="0" cy="0" r="4"/>

    <line id="line-vessel" x1="0" y1="0" x2="0" y2="0"/>
    <circle class="dot-end" id="dot-vessel" cx="0" cy="0" r="4"/>

    <line id="line-bone" x1="0" y1="0" x2="0" y2="0"/>
    <circle class="dot-end" id="dot-bone" cx="0" cy="0" r="4"/>
  </svg>

  <!-- Interactive Organ Buttons -->
  <button class="organ-btn" id="btn-brain" data-organ="brain" data-file="materials/brain.txt">Brain</button>
  <button class="organ-btn" id="btn-tongue" data-organ="tongue" data-file="materials/tongue.txt">Tongue</button>
  <button class="organ-btn" id="btn-heart" data-organ="heart" data-file="materials/heart.txt">Heart</button>
  <button class="organ-btn" id="btn-vessel" data-organ="vessel" data-file="materials/vessel.txt">Blood Vessel</button>
  <button class="organ-btn" id="btn-bone" data-organ="bone" data-file="materials/bone.txt">Bone</button>

</div>

<!-- ======================== MODAL ======================== -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">&times;</button>
    <div id="modal-title"></div>
    <div id="modal-loading">
      <div class="spinner"></div>
      Loading...
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ======================== JAVASCRIPT ======================== -->
<script>
(function() {

  /* -------- References -------- */
  const humanFigure   = document.getElementById('human-figure');
  const modalOverlay  = document.getElementById('modal-overlay');
  const modalTitle    = document.getElementById('modal-title');
  const modalContent  = document.getElementById('modal-content');
  const modalLoading  = document.getElementById('modal-loading');
  const modalClose    = document.getElementById('modal-close');
  const organButtons  = document.querySelectorAll('.organ-btn');

  /* -------- Organ target positions (% of the human image dimensions) -------- */
  /* These point to locations ON the body image where the line endpoint/dot goes */
  const organTargets = {
    brain:  { x: 0.50, y: 0.07 },
    tongue: { x: 0.42, y: 0.17 },
    heart:  { x: 0.55, y: 0.35 },
    vessel: { x: 0.45, y: 0.38 },
    bone:   { x: 0.62, y: 0.55 }
  };

  /*
   * Button placement config:
   * side: 'left' or 'right' — which side of the screen the button goes
   * yPct: vertical position as % of viewport height (from the reference screenshot)
   * margin: how far from the edge of the viewport (px)
   */
  const buttonLayout = {
    brain:  { side: 'right', yPct: 0.11, margin: 60 },
    tongue: { side: 'left',  yPct: 0.22, margin: 60 },
    heart:  { side: 'right', yPct: 0.35, margin: 60 },
    vessel: { side: 'left',  yPct: 0.48, margin: 60 },
    bone:   { side: 'right', yPct: 0.63, margin: 60 }
  };

  /* -------- Position buttons & draw lines -------- */
  function updateAll() {
    const imgRect = humanFigure.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    organButtons.forEach(function(btn) {
      const organ  = btn.dataset.organ;
      const layout = buttonLayout[organ];
      const target = organTargets[organ];
      if (!layout || !target) return;

      /* Position button */
      const btnH = btn.offsetHeight;
      const btnW = btn.offsetWidth;
      const topPx = vh * layout.yPct - btnH / 2;

      btn.style.top = topPx + 'px';

      if (layout.side === 'right') {
        btn.style.right = layout.margin + 'px';
        btn.style.left  = 'auto';
      } else {
        btn.style.left  = layout.margin + 'px';
        btn.style.right = 'auto';
      }

      /* Button center for SVG line start */
      const btnRect = btn.getBoundingClientRect();
      const bx = btnRect.left + btnRect.width / 2;
      const by = btnRect.top  + btnRect.height / 2;

      /* Target point on image */
      const tx = imgRect.left + imgRect.width  * target.x;
      const ty = imgRect.top  + imgRect.height * target.y;

      /* Update SVG */
      const line = document.getElementById('line-' + organ);
      const dot  = document.getElementById('dot-'  + organ);

      if (line) {
        line.setAttribute('x1', bx);
        line.setAttribute('y1', by);
        line.setAttribute('x2', tx);
        line.setAttribute('y2', ty);
      }
      if (dot) {
        dot.setAttribute('cx', tx);
        dot.setAttribute('cy', ty);
      }
    });
  }

  /* -------- Init -------- */
  humanFigure.addEventListener('load', updateAll);
  window.addEventListener('resize', updateAll);
  window.addEventListener('load', updateAll);
  if (humanFigure.complete) setTimeout(updateAll, 50);

  /* Periodic updates for late layout */
  let ticks = 0;
  const iv = setInterval(function() {
    updateAll();
    if (++ticks > 20) clearInterval(iv);
  }, 200);

  /* -------- Button Click → Modal -------- */
  organButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      const file  = btn.dataset.file;
      const title = btn.textContent;

      modalTitle.textContent   = title;
      modalContent.textContent = '';
      modalLoading.classList.add('show');
      modalOverlay.classList.add('active');

      fetch(file)
        .then(function(r) {
          if (!r.ok) throw new Error('File not found: ' + file);
          return r.text();
        })
        .then(function(text) {
          modalLoading.classList.remove('show');
          modalContent.textContent = text;
        })
        .catch(function(err) {
          modalLoading.classList.remove('show');
          modalContent.textContent = 'Could not load content.\n' + err.message;
        });
    });
  });

  /* -------- Close Modal -------- */
  modalClose.addEventListener('click', function() {
    modalOverlay.classList.remove('active');
  });
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) modalOverlay.classList.remove('active');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
      modalOverlay.classList.remove('active');
    }
  });

})();
</script>

</body>
</html>
