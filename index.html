<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Body Interactive</title>

<!-- ======================== CSS ======================== -->
<style>
  /* ---------- Reset & Base ---------- */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #000;
  }

  /* ---------- Background Gradient ---------- */
  #bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #0a1628 0%, #060d1a 40%, #020508 100%);
    z-index: 0;
  }

  /* ---------- Background Video ---------- */
  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: 0.3;
    pointer-events: none;
  }

  /* ---------- Main Container ---------- */
  #main-container {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- Body Wrapper (relative anchor for buttons) ---------- */
  #body-wrapper {
    position: relative;
    height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- Human Figure ---------- */
  #human-figure {
    height: 100%;
    max-height: 90vh;
    width: auto;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.15));
  }

  /* ---------- SVG Lines Layer ---------- */
  #lines-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  #lines-svg line {
    stroke: rgba(0, 180, 255, 0.5);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(0, 180, 255, 0.6));
    transition: stroke 0.3s ease, stroke-width 0.3s ease;
  }

  #lines-svg circle.dot-end {
    fill: rgba(0, 200, 255, 0.8);
    filter: drop-shadow(0 0 4px rgba(0, 200, 255, 0.9));
  }

  /* ---------- Interactive Buttons ---------- */
  .organ-btn {
    position: absolute;
    z-index: 4;
    background: rgba(0, 20, 50, 0.7);
    border: 1px solid rgba(0, 180, 255, 0.45);
    color: #b0dcff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.35s ease;
    box-shadow: 0 0 10px rgba(0, 150, 255, 0.15), inset 0 0 8px rgba(0, 150, 255, 0.05);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .organ-btn:hover {
    background: rgba(0, 60, 120, 0.75);
    border-color: rgba(0, 210, 255, 0.8);
    color: #ffffff;
    box-shadow: 0 0 20px rgba(0, 180, 255, 0.4), inset 0 0 12px rgba(0, 180, 255, 0.1);
    transform: scale(1.07);
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
  }

  .organ-btn:active {
    transform: scale(0.97);
  }

  /* ---------- Button Positions (% based relative to body-wrapper) ---------- */
  #btn-brain {
    top: 3%;
    right: -160px;
  }

  #btn-tongue {
    top: 14%;
    left: -160px;
  }

  #btn-heart {
    top: 32%;
    right: -160px;
  }

  #btn-vessel {
    top: 48%;
    left: -160px;
  }

  #btn-bone {
    top: 68%;
    right: -160px;
  }

  /* ---------- Modal Overlay ---------- */
  #modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  /* ---------- Modal Box ---------- */
  #modal-box {
    background: linear-gradient(145deg, rgba(8, 25, 50, 0.95), rgba(4, 12, 30, 0.98));
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 10px;
    width: 500px;
    max-width: 90vw;
    max-height: 70vh;
    padding: 30px 35px;
    position: relative;
    box-shadow: 0 0 40px rgba(0, 120, 255, 0.15), 0 0 80px rgba(0, 80, 200, 0.08);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s ease;
    overflow-y: auto;
  }

  #modal-overlay.active #modal-box {
    transform: translateY(0) scale(1);
  }

  #modal-title {
    font-size: 22px;
    font-weight: 600;
    color: #60c8ff;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 180, 255, 0.3);
    border-bottom: 1px solid rgba(0, 150, 255, 0.2);
    padding-bottom: 12px;
  }

  #modal-content {
    font-size: 15px;
    line-height: 1.75;
    color: #c0d8ee;
    white-space: pre-wrap;
  }

  #modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: transparent;
    border: 1px solid rgba(0, 180, 255, 0.3);
    color: #80b8e0;
    font-size: 18px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    line-height: 1;
  }

  #modal-close:hover {
    background: rgba(0, 120, 255, 0.2);
    border-color: rgba(0, 210, 255, 0.7);
    color: #fff;
    box-shadow: 0 0 12px rgba(0, 180, 255, 0.4);
  }

  /* ---------- Loading Spinner ---------- */
  #modal-loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: #5ab8e8;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #modal-loading.show {
    display: block;
  }

  #modal-loading .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0, 150, 255, 0.2);
    border-top: 3px solid rgba(0, 180, 255, 0.8);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ---------- Scrollbar for modal ---------- */
  #modal-box::-webkit-scrollbar {
    width: 6px;
  }
  #modal-box::-webkit-scrollbar-track {
    background: rgba(0, 20, 50, 0.5);
  }
  #modal-box::-webkit-scrollbar-thumb {
    background: rgba(0, 150, 255, 0.3);
    border-radius: 3px;
  }

  /* ---------- Responsive Adjustments ---------- */
  @media (max-width: 900px) {
    .organ-btn {
      font-size: 11px;
      padding: 6px 12px;
    }
    #btn-brain { right: -130px; }
    #btn-tongue { left: -130px; }
    #btn-heart { right: -130px; }
    #btn-vessel { left: -130px; }
    #btn-bone { right: -130px; }
  }

  @media (max-width: 650px) {
    #body-wrapper {
      height: 70vh;
    }
    .organ-btn {
      font-size: 10px;
      padding: 5px 10px;
    }
    #btn-brain { right: -110px; }
    #btn-tongue { left: -110px; }
    #btn-heart { right: -110px; }
    #btn-vessel { left: -110px; }
    #btn-bone { right: -110px; }
    #modal-box {
      padding: 22px 20px;
    }
    #modal-title {
      font-size: 18px;
    }
    #modal-content {
      font-size: 13px;
    }
  }
</style>
</head>
<body>

<!-- ======================== BACKGROUND GRADIENT ======================== -->
<div id="bg-gradient"></div>

<!-- ======================== BACKGROUND VIDEO ======================== -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="materials/background.mp4" type="video/mp4">
</video>

<!-- ======================== MAIN CONTAINER ======================== -->
<div id="main-container">

  <!-- ====== Body Wrapper (relative positioning anchor) ====== -->
  <div id="body-wrapper">

    <!-- Human Figure Image -->
    <img id="human-figure" src="materials/human.png" alt="Human Body">

    <!-- SVG Lines connecting buttons to organ locations -->
    <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg">
      <!-- Brain line -->
      <line id="line-brain" x1="0" y1="0" x2="0" y2="0"/>
      <circle class="dot-end" id="dot-brain" cx="0" cy="0" r="4"/>

      <!-- Tongue line -->
      <line id="line-tongue" x1="0" y1="0" x2="0" y2="0"/>
      <circle class="dot-end" id="dot-tongue" cx="0" cy="0" r="4"/>

      <!-- Heart line -->
      <line id="line-heart" x1="0" y1="0" x2="0" y2="0"/>
      <circle class="dot-end" id="dot-heart" cx="0" cy="0" r="4"/>

      <!-- Vessel line -->
      <line id="line-vessel" x1="0" y1="0" x2="0" y2="0"/>
      <circle class="dot-end" id="dot-vessel" cx="0" cy="0" r="4"/>

      <!-- Bone line -->
      <line id="line-bone" x1="0" y1="0" x2="0" y2="0"/>
      <circle class="dot-end" id="dot-bone" cx="0" cy="0" r="4"/>
    </svg>

    <!-- Interactive Organ Buttons -->
    <button class="organ-btn" id="btn-brain" data-organ="brain" data-file="materials/brain.txt">Brain</button>
    <button class="organ-btn" id="btn-tongue" data-organ="tongue" data-file="materials/tongue.txt">Tongue</button>
    <button class="organ-btn" id="btn-heart" data-organ="heart" data-file="materials/heart.txt">Heart</button>
    <button class="organ-btn" id="btn-vessel" data-organ="vessel" data-file="materials/vessel.txt">Blood Vessel</button>
    <button class="organ-btn" id="btn-bone" data-organ="bone" data-file="materials/bone.txt">Bone</button>

  </div><!-- /body-wrapper -->

</div><!-- /main-container -->

<!-- ======================== MODAL ======================== -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">&times;</button>
    <div id="modal-title"></div>
    <div id="modal-loading">
      <div class="spinner"></div>
      Loading...
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ======================== JAVASCRIPT ======================== -->
<script>
(function() {

  /* -------- References -------- */
  const bodyWrapper   = document.getElementById('body-wrapper');
  const humanFigure   = document.getElementById('human-figure');
  const linesSvg      = document.getElementById('lines-svg');
  const modalOverlay  = document.getElementById('modal-overlay');
  const modalBox      = document.getElementById('modal-box');
  const modalTitle    = document.getElementById('modal-title');
  const modalContent  = document.getElementById('modal-content');
  const modalLoading  = document.getElementById('modal-loading');
  const modalClose    = document.getElementById('modal-close');
  const organButtons  = document.querySelectorAll('.organ-btn');

  /* -------- Organ target positions (% of the human image) -------- */
  /* These represent approximate locations on the human figure image */
  const organTargets = {
    brain:  { x: 0.50, y: 0.06 },
    tongue: { x: 0.50, y: 0.13 },
    heart:  { x: 0.47, y: 0.30 },
    vessel: { x: 0.44, y: 0.42 },
    bone:   { x: 0.55, y: 0.65 }
  };

  /* -------- Draw pointer lines from buttons to organ targets -------- */
  function updateLines() {
    const wrapperRect = bodyWrapper.getBoundingClientRect();
    const imgRect     = humanFigure.getBoundingClientRect();

    /* Offset of the image within the wrapper */
    const imgOffsetX = imgRect.left - wrapperRect.left;
    const imgOffsetY = imgRect.top  - wrapperRect.top;

    organButtons.forEach(function(btn) {
      const organ = btn.dataset.organ;
      const target = organTargets[organ];
      if (!target) return;

      /* Button center relative to wrapper */
      const btnRect = btn.getBoundingClientRect();
      const bx = btnRect.left - wrapperRect.left + btnRect.width / 2;
      const by = btnRect.top  - wrapperRect.top  + btnRect.height / 2;

      /* Target point on the image relative to wrapper */
      const tx = imgOffsetX + imgRect.width  * target.x;
      const ty = imgOffsetY + imgRect.height * target.y;

      /* Update SVG line */
      const line = document.getElementById('line-' + organ);
      const dot  = document.getElementById('dot-'  + organ);

      if (line) {
        line.setAttribute('x1', bx);
        line.setAttribute('y1', by);
        line.setAttribute('x2', tx);
        line.setAttribute('y2', ty);
      }
      if (dot) {
        dot.setAttribute('cx', tx);
        dot.setAttribute('cy', ty);
      }
    });
  }

  /* -------- Initial draw & redraw on resize -------- */
  function init() {
    updateLines();
  }

  humanFigure.addEventListener('load', init);
  window.addEventListener('resize', updateLines);
  window.addEventListener('load', init);

  /* Fallback in case image is already cached */
  if (humanFigure.complete) {
    setTimeout(init, 50);
  }

  /* -------- Button Click → Open Modal with fetched text -------- */
  organButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      const organ   = btn.dataset.organ;
      const file    = btn.dataset.file;
      const title   = btn.textContent;

      /* Show modal */
      modalTitle.textContent   = title;
      modalContent.textContent = '';
      modalLoading.classList.add('show');
      modalOverlay.classList.add('active');

      /* Fetch text file */
      fetch(file)
        .then(function(response) {
          if (!response.ok) throw new Error('File not found: ' + file);
          return response.text();
        })
        .then(function(text) {
          modalLoading.classList.remove('show');
          modalContent.textContent = text;
        })
        .catch(function(err) {
          modalLoading.classList.remove('show');
          modalContent.textContent = 'Could not load content.\n' + err.message;
        });
    });
  });

  /* -------- Close Modal -------- */
  modalClose.addEventListener('click', function() {
    modalOverlay.classList.remove('active');
  });

  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) {
      modalOverlay.classList.remove('active');
    }
  });

  /* Close with Escape key */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
      modalOverlay.classList.remove('active');
    }
  });

  /* -------- Periodic line update to handle late layout shifts -------- */
  let ticks = 0;
  const interval = setInterval(function() {
    updateLines();
    ticks++;
    if (ticks > 20) clearInterval(interval);
  }, 200);

})();
</script>

</body>
</html>
